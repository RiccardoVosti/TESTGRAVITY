<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Artemis Program - Vacuum Chamber</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser-arcade-physics.min.js"></script>
    <style>
        @font-face { font-family: 'NbpInforma'; src: url('font/NbpInformaFivesix-2dXW.ttf') format('truetype'); }
        body { margin: 0; padding: 0; background-color: #000; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; font-family: 'NbpInforma', sans-serif; }
        #ui-wrapper { position: relative; width: 100vw; height: 100vh; background: #000; }
        
        #nasa-ui {
            position: absolute; top: 20px; right: 20px; width: 280px;
            background: rgba(0, 0, 0, 0.95); border: 2px solid #fff; 
            padding: 20px; border-radius: 0; 
            box-shadow: none; z-index: 1000;
        }

        .step-wrapper { position: relative; margin-top: 20px; }
        .step-line { position: absolute; top: 15px; bottom: 15px; left: 13px; width: 2px; background: #fff; z-index: 1; }
        .step-line-fill { position: absolute; top: 15px; left: 13px; width: 2px; background: #fff; z-index: 2; transition: height 0.6s ease-in-out; }
        .stepper-container { position: relative; z-index: 3; display: flex; flex-direction: column; gap: 20px; }
        .step { position: relative; display: flex; align-items: center; }
        .step-dot { width: 20px; height: 20px; background: #000; border: 2px solid #fff; transition: all 0.4s; flex-shrink: 0; }
        .step-label { margin-left: 15px; font-size: 15px; color: #fff; font-weight: bold; text-transform: uppercase; }

        .step.completed .step-dot { background: #fff; border-color: #fff; } 
        .step.completed .step-label { color: #fff; }
        .step.active .step-dot { background: #fff; border-color: #fff; transform: scale(1.1); } 
        .step.active .step-label { color: #fff; text-shadow: none; }
        .step.locked .step-dot { background: #000; border-color: #888; } 
        .step.locked .step-label { color: #888; }
        .step.golden .step-dot { width: 28px; height: 28px; border-width: 3px; border-color: #fff; background: #000; margin-left: -4px; }
        .step.golden .step-label { color: #fff; font-size: 16px; }
        .step.golden.active .step-dot, .step.golden.completed .step-dot { background: #fff; border-color: #fff; transform: scale(1.1); }
        .step.golden.active .step-label, .step.golden.completed .step-label { color: #fff; text-shadow: none; }

        #dialogue-box {
            position: absolute; top: 30px; left: 50%; transform: translateX(-50%);
            width: 800px; height: 180px; background: rgba(0, 0, 0, 0.98); border: 2px solid #fff; 
            display: none; align-items: center; padding: 0 30px; box-sizing: border-box; z-index: 1000; 
        }

        #profile-img-container { width: 120px; height: 120px; background: #111; border: 2px solid #fff; margin-right: 30px; flex-shrink: 0; display: flex; justify-content: center; align-items: center; overflow: hidden; }
        #avatar-img { width: 170%; image-rendering: pixelated; }
        #text-container { color: #fff; font-size: 26px; flex-grow: 1; border-left: 2px solid #fff; padding-left: 25px; line-height: 1.3; position: relative; }
        #press-e-hint { position: absolute; bottom: -25px; right: 0; font-size: 14px; color: #fff; animation: blink 1s infinite; }
        @keyframes blink { 50% { opacity: 0; } }

        #game-container { width: 100%; height: 100%; }
        canvas { image-rendering: pixelated; }

        #fade-overlay {
            position: absolute; top: 0; left: 0; width: 100vw; height: 100vh;
            background-color: #000; z-index: 9999; 
            display: flex; justify-content: center; align-items: center;
            opacity: 1; transition: opacity 1s ease; pointer-events: none;
        }
        
        #level-title-text {
            color: #fff; font-size: 40px; font-family: 'NbpInforma', sans-serif; text-align: center; line-height: 1.2;
            transition: opacity 0.5s ease;
        }
    </style>
</head>

<body>
    <audio id="bg-music" src="sound/lv4.mp3" loop></audio>

    <div id="fade-overlay">
        <div id="level-title-text">LEVEL 4<br>VACUUM CHAMBER</div>
    </div>

    <div id="ui-wrapper">
        <div id="nasa-ui">
            <div style="text-align: center; color:#fff; font-size:16px; text-transform: uppercase; font-weight: bold; letter-spacing: 2px; border-bottom: 2px solid #fff; padding-bottom: 10px;">
                ARTEMIS PROGRAM
            </div>
            <div class="step-wrapper">
                <div class="step-line"></div>
                <div id="step-line-fill" class="step-line-fill" style="height: 0%;"></div>
                <div id="stepper-container" class="stepper-container"></div>
            </div>
        </div>

        <div id="dialogue-box">
            <div id="profile-img-container"><img id="avatar-img" src="Personaggi_oggetti/Scienziato_faccia1.png"></div>
            <div id="text-container">
                <strong id="npc-name-tag" style="color: #fff; text-transform: uppercase; font-size: 22px;">Dr. Aris</strong><br>
                <span id="dialogue-content" style="color: #fff;"></span>
                <div id="press-e-hint">Press [E] to continue</div>
            </div>
        </div>
        <div id="game-container"></div>
    </div>

    <script>
        // --- GESTIONE AUDIO NUOVA TRACCIA ---
        window.addEventListener('DOMContentLoaded', () => {
            const bgMusic = document.getElementById('bg-music');
            
            if (sessionStorage.getItem('currentTrack') !== 'lv4') {
                sessionStorage.setItem('currentTrack', 'lv4');
                sessionStorage.setItem('musicTime', '0'); 
            }

            bgMusic.currentTime = parseFloat(sessionStorage.getItem('musicTime') || 0);

            let playPromise = bgMusic.play();
            if (playPromise !== undefined) {
                playPromise.catch(error => {
                    console.log("Il browser ha bloccato l'audio. Riparto al primo tasto premuto!");
                    const forceAudioPlay = () => {
                        bgMusic.play();
                        sessionStorage.setItem('musicPlaying', 'true');
                        document.removeEventListener('click', forceAudioPlay);
                        document.removeEventListener('keydown', forceAudioPlay);
                    };
                    document.addEventListener('click', forceAudioPlay);
                    document.addEventListener('keydown', forceAudioPlay);
                });
            } else {
                sessionStorage.setItem('musicPlaying', 'true');
            }
            
            window.addEventListener('beforeunload', () => {
                sessionStorage.setItem('musicTime', bgMusic.currentTime);
            });
        });

        // --- GIOCO ---
        const playerName = localStorage.getItem('astronautName') || "Recruit";

        const missions = [
            { id: 0, title: "Drop Tower", status: "completed" }, 
            { id: 1, title: "Zero Gravity", status: "completed" },  
            { id: 2, title: "N.B.L. Lab", status: "completed" }, 
            { id: 3, title: "Vacuum Chamber", status: "active" }, 
            { id: 4, title: "Centrifuge", status: "locked" },
            { id: 5, title: "Moon Journey", status: "locked" } 
        ];

        let hasTalkedToScientist = false;
        let isDialogOpen = false;
        let isTransitioning = false;
        
        let experimentState = 'READY_1'; 
        let ballLanded = false;
        let featherLanded = false;

        let currentDialogueArray = [];
        let dialogueIndex = 0;
        let onDialogueComplete = null; 

        function updateUI() {
            const stepper = document.getElementById('stepper-container');
            const progressFill = document.getElementById('step-line-fill');
            if (!stepper || !progressFill) return;

            stepper.innerHTML = '';
            
            let activeIndex = missions.findIndex(m => m.status === 'active');
            if(activeIndex === -1) activeIndex = missions.length - 1; 
            
            let segments = missions.length - 1;
            let fillPercentage = (activeIndex / segments) * 100;
            progressFill.style.height = `${fillPercentage}%`;

            missions.forEach((m) => {
                const stepDiv = document.createElement('div');
                stepDiv.className = `step ${m.status}`;
                if (m.id === 5) stepDiv.classList.add('golden'); 

                const dot = document.createElement('div');
                dot.className = 'step-dot';
                
                const label = document.createElement('div');
                label.className = 'step-label';
                label.innerHTML = m.title;

                stepDiv.appendChild(dot);
                stepDiv.appendChild(label);
                stepper.appendChild(stepDiv);
            });
        }

        const WORLD_WIDTH = 2200; 
        const WORLD_HEIGHT = 900; 
        const FLOOR_Y = WORLD_HEIGHT - 50; 
        
        const CHAMBER_HEIGHT = 450; 
        const CHAMBER_TOP_Y = FLOOR_Y - CHAMBER_HEIGHT; 
        const DROP_Y = CHAMBER_TOP_Y + 120; 

        const SETTINGS = {
            playerScale: 5, npcScale: 6, npcX: 550, playerStartX: 100, 
            gravity: 2000, walkSpeed: 380, jumpForce: -850,
            minZoom: 1.0, maxZoom: 2.0, initialZoom: 1.5, 
            zoomLerp: 0.1 
        };

        const config = {
            type: Phaser.AUTO, parent: 'game-container',
            width: window.innerWidth, height: window.innerHeight,
            backgroundColor: '#050505', pixelArt: true,
            physics: { default: 'arcade', arcade: { gravity: { y: SETTINGS.gravity } } },
            scene: { preload: preload, create: create, update: update }
        };

        const game = new Phaser.Game(config);
        let player, npc, keys, interactKey, portalStart, portalEnd, jumpSound;
        let consolePanel, chamberLeft, chamberRight, chamberTop, palla, piuma;
        let chamberWalls; 
        let playerWallCollider; 
        let airParticles; 

        function preload() {
            this.load.image('sfondo', 'Personaggi_oggetti/NBL.png');
            this.load.image('astro1', 'Personaggi_oggetti/astronauta_neutro1.png');
            this.load.image('astro2', 'Personaggi_oggetti/astronauta_neutro2.png');
            this.load.image('walk1', 'Personaggi_oggetti/astronauta_camminata1.png');
            this.load.image('walk2', 'Personaggi_oggetti/astronauta_camminata2.png');
            this.load.image('scienziato1', 'Personaggi_oggetti/Scienziato_neutro1.png');
            this.load.image('scienziato2', 'Personaggi_oggetti/Scienziato_neutro2.png');
            this.load.image('porta', 'Personaggi_oggetti/porta.png');
            this.load.image('console', 'Personaggi_oggetti/console.png'); 
            this.load.image('palla', 'Personaggi_oggetti/palla.png'); 
            this.load.image('piuma', 'Personaggi_oggetti/piuma.png'); 
            this.load.audio('jump_sound', 'sound/jump.wav'); 
        }

        function create() {
            updateUI();
            this.physics.world.setBounds(0, 0, WORLD_WIDTH, WORLD_HEIGHT);
            jumpSound = this.sound.add('jump_sound');

            let bg = this.add.image(WORLD_WIDTH / 2, 0, 'sfondo');
            bg.setOrigin(0.5, 0); 
            bg.setDisplaySize(WORLD_WIDTH, FLOOR_Y).setDepth(-1); 

            let platforms = this.physics.add.staticGroup();
            let floor = this.add.rectangle(WORLD_WIDTH / 2, FLOOR_Y + 10, WORLD_WIDTH, 40, 0x333333);
            platforms.add(floor); 

            chamberWalls = this.physics.add.staticGroup();
            chamberLeft = this.add.rectangle(1300, FLOOR_Y - CHAMBER_HEIGHT/2, 20, CHAMBER_HEIGHT, 0xaaaaaa, 1); 
            chamberRight = this.add.rectangle(1700, FLOOR_Y - CHAMBER_HEIGHT/2, 20, CHAMBER_HEIGHT, 0xaaaaaa, 1); 
            chamberTop = this.add.rectangle(1500, CHAMBER_TOP_Y, 420, 20, 0xaaaaaa, 1); 

            chamberWalls.add(chamberLeft);
            chamberWalls.add(chamberRight);
            chamberWalls.add(chamberTop); 

            let chamberBg = this.add.rectangle(1500, FLOOR_Y - CHAMBER_HEIGHT/2, 380, CHAMBER_HEIGHT, 0x112233, 0.3).setDepth(0);

            let graphics = this.make.graphics({x: 0, y: 0, add: false});
            graphics.fillStyle(0xffffff, 0.4); 
            graphics.fillRect(0, 0, 4, 4);
            graphics.generateTexture('air_pixel', 4, 4);

            airParticles = this.add.particles(0, 0, 'air_pixel', {
                x: { min: 1320, max: 1680 },
                y: { min: CHAMBER_TOP_Y + 20, max: FLOOR_Y - 20 }, 
                lifspan: 3000,
                speed: { min: 5, max: 20 },
                angle: { min: 0, max: 360 },
                scale: { start: 1, end: 0 },
                quantity: 1, 
                blendMode: 'ADD'
            }).setDepth(1); 

            consolePanel = this.physics.add.staticSprite(1150, FLOOR_Y - 10, 'console');
            consolePanel.setOrigin(0.5, 1).setScale(SETTINGS.playerScale).refreshBody(); 

            palla = this.physics.add.sprite(1420, DROP_Y, 'palla').setScale(3).setDepth(2);
            piuma = this.physics.add.sprite(1580, DROP_Y, 'piuma').setScale(3).setDepth(2);
            palla.body.setAllowGravity(false);
            piuma.body.setAllowGravity(false);
            
            this.physics.add.collider(palla, platforms, () => {
                if (experimentState === 'DROPPING_1' || experimentState === 'DROPPING_2') {
                    ballLanded = true;
                    palla.setVelocity(0,0);
                    checkExperimentProgress();
                }
            });
            this.physics.add.collider(piuma, platforms, () => {
                if (experimentState === 'DROPPING_1' || experimentState === 'DROPPING_2') {
                    featherLanded = true;
                    piuma.setVelocity(0,0);
                    checkExperimentProgress();
                }
            });

            portalStart = this.physics.add.sprite(100, FLOOR_Y - 10, 'porta').setOrigin(0.5, 1).setScale(5).setDepth(2);
            portalEnd = this.physics.add.sprite(2000, FLOOR_Y - 10, 'porta').setOrigin(0.5, 1).setScale(5).setDepth(2);
            portalStart.body.setAllowGravity(false); portalEnd.body.setAllowGravity(false);
            portalStart.setTint(0x555555); 
            portalEnd.setTint(0x555555); 

            npc = this.physics.add.sprite(SETTINGS.npcX, FLOOR_Y - 10, 'scienziato1').setScale(SETTINGS.npcScale).setOrigin(0.5, 1).setDepth(3);
            player = this.physics.add.sprite(SETTINGS.playerStartX, FLOOR_Y - 10, 'astro1').setScale(SETTINGS.playerScale).setOrigin(0.5, 1).setDepth(4);

            this.physics.add.collider(player, platforms);
            this.physics.add.collider(npc, platforms);
            playerWallCollider = this.physics.add.collider(player, chamberWalls); 
            
            player.setCollideWorldBounds(true);
            npc.setImmovable(true); npc.body.setAllowGravity(false);

            this.anims.create({ key: 'astro_idle', frames: [{ key: 'astro1' }, { key: 'astro2' }], frameRate: 4, repeat: -1 });
            this.anims.create({ key: 'astro_walk', frames: [{ key: 'walk1' }, { key: 'walk2' }], frameRate: 10, repeat: -1 });
            this.anims.create({ key: 'scien_idle', frames: [{ key: 'scienziato1' }, { key: 'scienziato2' }], frameRate: 3, repeat: -1 });
            npc.play('scien_idle');

            this.cameras.main.setBounds(0, 0, WORLD_WIDTH, WORLD_HEIGHT);
            this.cameras.main.startFollow(player, true, 0.1, 0.1).setZoom(SETTINGS.initialZoom);

            keys = this.input.keyboard.addKeys('W,A,D,SPACE');
            interactKey = this.input.keyboard.addKey('E');
            this.interactPrompt = this.add.text(0, 0, "", { fontSize: '20px', fill: '#ffffff', fontFamily: 'NbpInforma' }).setOrigin(0.5).setVisible(false).setDepth(10);

            setTimeout(() => {
                document.getElementById('fade-overlay').style.opacity = '0';
            }, 1000);
        }

        function triggerMainDialogue() {
            startDialogue([
                `Great work, ${playerName}. Now let's change the rules of physics.`,
                `This is the NASA Space Power Facility. Before you is the world's largest vacuum chamber.`,
                `We will replicate the famous experiment performed on the Moon by Apollo 15 Commander David Scott.`,
                `He dropped a heavy hammer and a falcon feather to prove Galileo's theory of gravity.`,
                `Here, we will drop a heavy bowling ball and a lightweight feather.`,
                `Go to the console. For the first test, leave the air in the chamber and press [E] to drop them.`
            ], () => { hasTalkedToScientist = true; });
        }

        function checkExperimentProgress() {
            if (ballLanded && featherLanded) {
                if (experimentState === 'DROPPING_1') {
                    experimentState = 'RESETTING';
                    ballLanded = false; featherLanded = false;
                    airParticles.stop(); 

                    startDialogue([
                        `As expected! Air resistance slowed the feather down, while the ball plummeted.`,
                        `Now let's get serious. I've reset the experiment and pumped out the air, creating a VACUUM.`,
                        `Return to the console. By pressing [E], both masses will be dropped again. Watch closely!`
                    ], () => { 
                        resetObjects(); 
                        experimentState = 'READY_2'; 
                    });
                } 
                else if (experimentState === 'DROPPING_2') {
                    experimentState = 'COMPLETED';
                    missions[3].status = "completed";
                    updateUI();
                    playerWallCollider.active = false;

                    startDialogue([
                        `Incredible, isn't it? Without air resistance, gravity accelerates all objects at the same rate!`,
                        `The ball and feather hit the ground at exactly the same time.`,
                        `Galileo Galilei was right, and now you've proven it yourself.`,
                        `The experiment is a success. The chamber walls are now passable, proceed to the exit!`
                    ]);
                }
            }
        }

        function resetObjects() {
            palla.body.setAllowGravity(false);
            piuma.body.setAllowGravity(false);
            palla.setVelocity(0, 0);
            piuma.setVelocity(0, 0);
            palla.setPosition(1420, DROP_Y); 
            piuma.setPosition(1580, DROP_Y); 
        }

        function startDialogue(phrases, callback = null) {
            currentDialogueArray = phrases;
            dialogueIndex = 0;
            isDialogOpen = true;
            onDialogueComplete = callback; 
            
            if (player) {
                player.setVelocityX(0);
                player.play('astro_idle', true);
            }

            document.getElementById('dialogue-content').innerText = currentDialogueArray[dialogueIndex];
            document.getElementById('dialogue-box').style.display = 'flex';
            setTimeout(() => document.getElementById('dialogue-box').style.opacity = '1', 10);
        }

        function update(time) {
            npc.setFlipX(player.x < npc.x);
            if (isTransitioning) return;
            if (isDialogOpen) {
                player.setVelocityX(0).play('astro_idle', true);
                if (Phaser.Input.Keyboard.JustDown(interactKey)) {
                    dialogueIndex++;
                    if (dialogueIndex < currentDialogueArray.length) {
                        document.getElementById('dialogue-content').innerText = currentDialogueArray[dialogueIndex];
                    } else {
                        isDialogOpen = false;
                        document.getElementById('dialogue-box').style.opacity = '0';
                        setTimeout(() => document.getElementById('dialogue-box').style.display = 'none', 200);
                        if (onDialogueComplete) { onDialogueComplete(); onDialogueComplete = null; }
                    }
                }
                return; 
            }

            if (!hasTalkedToScientist && player.x > npc.x - 60) {
                player.setX(npc.x - 70).setVelocityX(0);
                triggerMainDialogue();
            }

            if (keys.A.isDown) {
                player.setVelocityX(-SETTINGS.walkSpeed).setFlipX(true).play('astro_walk', true);
            } else if (keys.D.isDown) {
                player.setVelocityX(SETTINGS.walkSpeed).setFlipX(false).play('astro_walk', true);
            } else {
                player.setVelocityX(0).play('astro_idle', true);
            }

            if ((Phaser.Input.Keyboard.JustDown(keys.W) || Phaser.Input.Keyboard.JustDown(keys.SPACE)) && player.body.touching.down) {
                player.setVelocityY(SETTINGS.jumpForce);
                jumpSound.play(); 
            }
            
            if (experimentState === 'DROPPING_1' && !featherLanded) {
                piuma.x = 1580 + Math.sin(time / 150) * 60;
            }

            this.interactPrompt.setVisible(false);
            let distNpc = Phaser.Math.Distance.Between(player.x, player.y, npc.x, npc.y);
            let distConsole = Phaser.Math.Distance.Between(player.x, player.y, consolePanel.x, consolePanel.y);
            let distDoor = Phaser.Math.Distance.Between(player.x, player.y, portalEnd.x, portalEnd.y);

            if (distNpc < 200) {
                this.interactPrompt.setPosition(npc.x, npc.y - 220).setText("[E] TALK").setVisible(true);
                if (Phaser.Input.Keyboard.JustDown(interactKey) && !isDialogOpen) {
                    if (!hasTalkedToScientist) {
                        triggerMainDialogue();
                    } else if (experimentState === 'READY_1') {
                        startDialogue([`Go to the console and press [E] to test with air resistance.`]);
                    } else if (experimentState === 'READY_2') {
                        startDialogue([`I've removed the air. Go to the console and press [E] to try again.`]);
                    }
                }
            } 
            else if (distConsole < 150 && hasTalkedToScientist) {
                if (experimentState === 'READY_1') {
                    this.interactPrompt.setPosition(consolePanel.x, consolePanel.y - 180).setText("[E] RELEASE (AIR)").setVisible(true);
                    if (Phaser.Input.Keyboard.JustDown(interactKey)) {
                        experimentState = 'DROPPING_1';
                        palla.body.setAllowGravity(true);
                        piuma.body.setAllowGravity(true).setMaxVelocity(10000, 150); 
                    }
                } 
                else if (experimentState === 'READY_2') {
                    this.interactPrompt.setPosition(consolePanel.x, consolePanel.y - 180).setText("[E] RELEASE (VACUUM)").setVisible(true);
                    if (Phaser.Input.Keyboard.JustDown(interactKey)) {
                        experimentState = 'DROPPING_2';
                        palla.body.setAllowGravity(true);
                        piuma.body.setAllowGravity(true).setMaxVelocity(10000, 10000); 
                        piuma.x = 1580; 
                    }
                }
            }
            else if (distDoor < 150) {
                if (experimentState !== 'COMPLETED') {
                    this.interactPrompt.setPosition(portalEnd.x, portalEnd.y - 250).setText("LOCKED").setVisible(true);
                } else {
                    if (distDoor < 50 && !isTransitioning) {
                        isTransitioning = true;
                        player.setVelocity(0, 0).play('astro_idle', true);
                        document.getElementById('level-title-text').style.opacity = '0'; 
                        document.getElementById('fade-overlay').style.opacity = '1'; 
                        setTimeout(() => { window.location.href = 'livello5.html'; }, 1000);
                    } else if (!isTransitioning) {
                        this.interactPrompt.setPosition(portalEnd.x, portalEnd.y - 250).setText("ENTER").setVisible(true);
                    }
                }
            }
        }
    </script>
</body>
</html>
