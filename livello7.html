<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Artemis Program - Moon Journey</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #000;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* --- SFONDO PARTICELLARE --- */
        #particle-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none;
        }

        /* --- ASTRONAVE E FIAMME AL CENTRO --- */
        #spaceship-container {
            position: relative;
            z-index: 5;
            animation: floatSpaceship 3s ease-in-out infinite;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        #spaceship {
            width: 250px;
            height: auto;
            image-rendering: pixelated;
            z-index: 2; /* Tiene l'astronave davanti alle fiamme */
        }

        /* --- CANVAS PER LE FIAMME DEI MOTORI --- */
        #flame-canvas {
            position: absolute;
            bottom: -80px; 
            left: 50%;
            transform: translateX(-50%);
            width: 120px;
            height: 150px;
            z-index: 1; /* Dietro la navicella */
            pointer-events: none;
        }

        @keyframes floatSpaceship {
            0% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(1deg); }
            100% { transform: translateY(0px) rotate(0deg); }
        }

        /* --- OVERLAY PER TRANSIZIONE (Senza testo, solo nero) --- */
        #fade-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: #000;
            z-index: 9999;
            pointer-events: none;
            opacity: 1; /* Parte completamente nero */
            transition: opacity 1.5s ease;
        }
    </style>
</head>
<body>

    <audio id="bg-music" src="sound/luna.mp3" loop></audio>

    <canvas id="particle-canvas"></canvas>

    <div id="spaceship-container">
        <img id="spaceship" src="Personaggi_oggetti/astronave.png" alt="Artemis Spaceship">
        <canvas id="flame-canvas"></canvas>
    </div>

    <div id="fade-overlay"></div>

    <script>
        // --- GESTIONE AUDIO NUOVA TRACCIA ---
        window.addEventListener('DOMContentLoaded', () => {
            const bgMusic = document.getElementById('bg-music');
            
            // Verifichiamo se stiamo passando a una traccia nuova
            if (sessionStorage.getItem('currentTrack') !== 'luna') {
                sessionStorage.setItem('currentTrack', 'luna');
                sessionStorage.setItem('musicTime', '0'); // Resetta il timer per la nuova canzone
            }

            // Imposta il tempo salvato
            bgMusic.currentTime = parseFloat(sessionStorage.getItem('musicTime') || 0);

            // Prova l'autoplay (dovrebbe funzionare dato che l'utente ha interagito nei livelli precedenti)
            let playPromise = bgMusic.play();
            if (playPromise !== undefined) {
                playPromise.catch(error => {
                    console.log("Il browser ha bloccato l'audio. Riparto al primo tasto premuto!");
                    const forceAudioPlay = () => {
                        bgMusic.play();
                        sessionStorage.setItem('musicPlaying', 'true');
                        document.removeEventListener('click', forceAudioPlay);
                        document.removeEventListener('keydown', forceAudioPlay);
                    };
                    document.addEventListener('click', forceAudioPlay);
                    document.addEventListener('keydown', forceAudioPlay);
                });
            } else {
                sessionStorage.setItem('musicPlaying', 'true');
            }
            
            // Salva il tempo esatto prima di cambiare pagina verso luna.html
            window.addEventListener('beforeunload', () => {
                sessionStorage.setItem('musicTime', bgMusic.currentTime);
            });
        });

        // --- GESTIONE TRANSIZIONE E REINDIRIZZAMENTO ---
        window.onload = () => {
            const overlay = document.getElementById('fade-overlay');

            // 1. Dopo mezzo secondo, dissolve il nero iniziale per rivelare la scena
            setTimeout(() => {
                overlay.style.opacity = '0';
            }, 500);

            // 2. Dopo 4.5 secondi, inizia a scurire di nuovo lo schermo
            setTimeout(() => {
                overlay.style.opacity = '1';
            }, 4500);

            // 3. Dopo 6 secondi esatti, cambia pagina verso luna.html
            setTimeout(() => {
                window.location.href = 'luna.html';
            }, 6000);
        };

        // --- 1. LOGICA EFFETTO PARTICELLE (STELLE DELLO SPAZIO) ---
        const canvas = document.getElementById('particle-canvas');
        const ctx = canvas.getContext('2d');
        let particlesArray = [];

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        window.addEventListener('resize', function() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            initParticles();
        });

        class Particle {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.size = Math.random() * 2 + 1; 
                this.speedY = Math.random() * 20 + 10; 
                this.opacity = Math.random() * 0.8 + 0.2;
            }

            update() {
                this.y += this.speedY; 
                if (this.y > canvas.height) {
                    this.y = -10;
                    this.x = Math.random() * canvas.width;
                    this.speedY = Math.random() * 20 + 10;
                }
            }

            draw() {
                ctx.fillStyle = `rgba(255, 255, 255, ${this.opacity})`;
                ctx.fillRect(this.x, this.y, this.size, this.size * 2); 
            }
        }

        function initParticles() {
            particlesArray = [];
            let numberOfParticles = (canvas.width * canvas.height) / 4000; 
            for (let i = 0; i < numberOfParticles; i++) {
                particlesArray.push(new Particle());
            }
        }

        function animateParticles() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            for (let i = 0; i < particlesArray.length; i++) {
                particlesArray[i].update();
                particlesArray[i].draw();
            }
            requestAnimationFrame(animateParticles);
        }

        initParticles();
        animateParticles();


        // --- 2. LOGICA EFFETTO PARTICELLE (FIAMMA MOTORI) ---
        const flameCanvas = document.getElementById('flame-canvas');
        const fctx = flameCanvas.getContext('2d');
        let flamesArray = [];

        flameCanvas.width = 120;
        flameCanvas.height = 150;

        class FlameParticle {
            constructor() {
                this.x = flameCanvas.width / 2 + (Math.random() * 40 - 20); 
                this.y = 10; 
                this.size = Math.random() * 6 + 3; 
                this.speedY = Math.random() * 6 + 3; 
                this.speedX = (Math.random() - 0.5) * 2; 
                this.life = 1.0; 
                this.decay = Math.random() * 0.05 + 0.02; 
            }

            update() {
                this.y += this.speedY;
                this.x += this.speedX;
                this.life -= this.decay;
            }

            draw() {
                const red = 255;
                const green = Math.floor(this.life * 220); 
                const blue = Math.floor(this.life * 100);  

                fctx.fillStyle = `rgba(${red}, ${green}, ${blue}, ${this.life})`;
                fctx.fillRect(this.x, this.y, this.size, this.size); 
            }
        }

        function animateFlames() {
            fctx.clearRect(0, 0, flameCanvas.width, flameCanvas.height);
            
            for (let i = 0; i < 4; i++) {
                flamesArray.push(new FlameParticle());
            }

            for (let i = 0; i < flamesArray.length; i++) {
                flamesArray[i].update();
                flamesArray[i].draw();
                
                if (flamesArray[i].life <= 0) {
                    flamesArray.splice(i, 1);
                    i--;
                }
            }
            requestAnimationFrame(animateFlames);
        }

        animateFlames();

    </script>
</body>
</html>
