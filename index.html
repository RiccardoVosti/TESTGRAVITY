<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Artemis Program - Inizio Missione</title>
    <style>
        @font-face { 
            font-family: 'NbpInforma'; 
            src: url('font/NbpInformaFivesix-2dXW.ttf') format('truetype'); 
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #000;
            font-family: 'NbpInforma', sans-serif;
            overflow: hidden; 
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* --- SFONDO PARTICELLARE --- */
        #particle-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none; 
        }

        /* --- PULSANTE MUSICA (In alto a destra) --- */
        #music-toggle {
            position: absolute;
            top: 30px;
            right: 40px;
            z-index: 100;
            background: transparent;
            color: #fff;
            border: 2px solid #fff;
            font-family: 'NbpInforma', sans-serif;
            font-size: 24px;
            padding: 10px 15px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 50px;
            height: 50px;
            border-radius: 50%; /* Tasto rotondo */
        }

        #music-toggle:hover {
            background: #fff;
            color: #000;
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.8);
        }

        /* --- CONTENITORE UI (Sopra il canvas) --- */
        #ui-container {
            position: relative;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            width: 100%;
            max-width: 1200px; 
            padding: 20px;
        }

        /* --- IMMAGINE TITOLO (5 Volte più Grande) --- */
        #game-title {
            width: 800px; 
            height: auto;
            margin-bottom: 0px; 
            filter: drop-shadow(0px 0px 15px rgba(255, 255, 255, 0.3)); 
            image-rendering: pixelated; 
        }

        /* --- CAMPO INSERIMENTO NOME --- */
        #name-input {
            background: rgba(0, 0, 0, 0.8);
            border: 2px solid #fff;
            color: #fff;
            font-family: 'NbpInforma', sans-serif;
            font-size: 24px;
            padding: 15px 20px;
            width: 350px;
            text-align: center;
            text-transform: uppercase;
            outline: none;
            margin-bottom: 30px;
            transition: all 0.3s ease;
        }

        #name-input::placeholder {
            color: #666;
        }

        #name-input:focus {
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.5);
        }

        /* --- BOTTONE INIZIA --- */
        #start-btn {
            background-color: #fff;
            color: #000;
            border: 2px solid #fff;
            font-family: 'NbpInforma', sans-serif;
            font-size: 24px;
            font-weight: bold;
            padding: 15px 40px;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        #start-btn:hover {
            background-color: #000;
            color: #fff;
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.8);
        }

        #start-btn:active {
            transform: scale(0.95);
        }

        /* --- OVERLAY PER TRANSIZIONE NERA --- */
        #fade-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #000;
            z-index: 9999;
            opacity: 0;
            pointer-events: none;
            transition: opacity 1s ease;
        }
    </style>
</head>
<body>

    <audio id="bg-music" src="sound/bg_music.mp3" loop></audio>

    <button id="music-toggle" title="Attiva/Disattiva Musica">🎵</button>

    <canvas id="particle-canvas"></canvas>

    <div id="ui-container">
        <img id="game-title" src="Personaggi_oggetti/titolo.png" alt="Programma Artemis">
        
        <input type="text" id="name-input" placeholder="INSERISCI IL TUO NOME" maxlength="12" autocomplete="off">
        
        <button id="start-btn">INIZIA ESPERIMENTI</button>
    </div>

    <div id="fade-overlay"></div>

    <script>
        // --- LOGICA EFFETTO PARTICELLE ---
        const canvas = document.getElementById('particle-canvas');
        const ctx = canvas.getContext('2d');
        let particlesArray = [];

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        window.addEventListener('resize', function() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            initParticles();
        });

        class Particle {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.size = Math.random() * 3 + 1; 
                this.speedY = Math.random() * 1 + 0.1; 
                this.opacity = Math.random() * 0.5 + 0.2;
            }

            update() {
                this.y -= this.speedY; 
                if (this.y < 0 - this.size) {
                    this.y = canvas.height + this.size;
                    this.x = Math.random() * canvas.width;
                    this.opacity = Math.random() * 0.5 + 0.2;
                }
            }

            draw() {
                ctx.fillStyle = `rgba(255, 255, 255, ${this.opacity})`;
                ctx.fillRect(this.x, this.y, this.size, this.size); 
            }
        }

        function initParticles() {
            particlesArray = [];
            let numberOfParticles = (canvas.width * canvas.height) / 5000; 
            for (let i = 0; i < numberOfParticles; i++) {
                particlesArray.push(new Particle());
            }
        }

        function animateParticles() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            for (let i = 0; i < particlesArray.length; i++) {
                particlesArray[i].update();
                particlesArray[i].draw();
            }
            requestAnimationFrame(animateParticles);
        }

        initParticles();
        animateParticles();

        // --- GESTIONE AUDIO GLOBALE E PULSANTE ---
        const bgMusic = document.getElementById('bg-music');
        const musicToggleBtn = document.getElementById('music-toggle');
        
        // Controlliamo se l'utente aveva mutato la musica in sessioni precedenti
        let isMusicMuted = sessionStorage.getItem('musicMuted') === 'true';

        // Aggiorna l'icona del pulsante
        function updateMusicIcon() {
            if (isMusicMuted || bgMusic.paused) {
                musicToggleBtn.innerHTML = '🔇';
            } else {
                musicToggleBtn.innerHTML = '🎵';
            }
        }

        // Funzione per far partire la musica al primissimo click sulla pagina
        const startAudioOnInteraction = () => {
            if (!isMusicMuted && bgMusic.paused) {
                bgMusic.play().then(() => {
                    sessionStorage.setItem('musicPlaying', 'true');
                    updateMusicIcon();
                }).catch(e => console.log("In attesa del browser...", e));
            }
            // Rimuoviamo il listener dopo il primo click
            document.removeEventListener('click', startAudioOnInteraction);
            document.removeEventListener('keydown', startAudioOnInteraction);
        };

        // Gestione del click sul pulsante Musica
        musicToggleBtn.addEventListener('click', (e) => {
            e.stopPropagation(); // Evita che il click sul bottone attivi "startAudioOnInteraction"
            
            if (bgMusic.paused) {
                bgMusic.play();
                isMusicMuted = false;
                sessionStorage.setItem('musicPlaying', 'true');
                sessionStorage.setItem('musicMuted', 'false');
            } else {
                bgMusic.pause();
                isMusicMuted = true;
                sessionStorage.setItem('musicPlaying', 'false');
                sessionStorage.setItem('musicMuted', 'true');
            }
            updateMusicIcon();
        });

        // Al caricamento della pagina
        window.addEventListener('DOMContentLoaded', () => {
            updateMusicIcon();

            // Se la musica stava suonando prima del refresh/back
            if (sessionStorage.getItem('musicPlaying') === 'true' && !isMusicMuted) {
                bgMusic.currentTime = parseFloat(sessionStorage.getItem('musicTime') || 0);
                bgMusic.play().then(() => {
                    updateMusicIcon();
                }).catch(e => {
                    // Se bloccato, attendiamo interazione
                    document.addEventListener('click', startAudioOnInteraction);
                    document.addEventListener('keydown', startAudioOnInteraction);
                });
            } else {
                // Prima volta sulla pagina: aspetta che l'utente clicchi qualcosa (es. il campo nome)
                document.addEventListener('click', startAudioOnInteraction);
                document.addEventListener('keydown', startAudioOnInteraction);
            }
            
            // Salviamo il punto esatto in cui siamo arrivati prima di cambiare pagina
            window.addEventListener('beforeunload', () => {
                sessionStorage.setItem('musicTime', bgMusic.currentTime);
            });
        });

        // --- LOGICA DI GIOCO E TRANSIZIONE ---
        const startBtn = document.getElementById('start-btn');
        const nameInput = document.getElementById('name-input');
        const fadeOverlay = document.getElementById('fade-overlay');

        function startGame() {
            let playerName = nameInput.value.trim();
            if (playerName === "") {
                playerName = "Recluta";
            }

            localStorage.setItem('astronautName', playerName);

            // Assicuriamoci che i flag siano corretti prima di cambiare pagina
            if (!bgMusic.paused) {
                sessionStorage.setItem('musicPlaying', 'true');
            }

            fadeOverlay.style.opacity = 1;

            setTimeout(() => {
                sessionStorage.setItem('musicTime', bgMusic.currentTime);
                window.location.href = 'livello1.html'; 
            }, 1000);
        }

        startBtn.addEventListener('click', startGame);

        nameInput.addEventListener('keypress', function (e) {
            if (e.key === 'Enter') {
                startGame();
            }
        });
    </script>
</body>
</html>
