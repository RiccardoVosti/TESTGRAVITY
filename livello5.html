<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Artemis Program - Centrifuge (PHYSICAL TRAINING)</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser-arcade-physics.min.js"></script>
    <style>
        @font-face { font-family: 'NbpInforma'; src: url('font/NbpInformaFivesix-2dXW.ttf') format('truetype'); }
        body { margin: 0; padding: 0; background-color: #000; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; font-family: 'NbpInforma', sans-serif; }
        #ui-wrapper { position: relative; width: 100vw; height: 100vh; background: #000; }
        
        #nasa-ui {
            position: absolute; top: 20px; right: 20px; width: 280px;
            background: rgba(0, 0, 0, 0.95); border: 2px solid #fff; 
            padding: 20px; border-radius: 0; 
            box-shadow: none; z-index: 1000;
        }

        .step-wrapper { position: relative; margin-top: 20px; }
        .step-line { position: absolute; top: 15px; bottom: 15px; left: 13px; width: 2px; background: #fff; z-index: 1; }
        .step-line-fill { position: absolute; top: 15px; left: 13px; width: 2px; background: #fff; z-index: 2; transition: height 0.6s ease-in-out; box-shadow: none; }
        .stepper-container { position: relative; z-index: 3; display: flex; flex-direction: column; gap: 20px; }
        .step { position: relative; display: flex; align-items: center; }
        
        .step-dot {
            width: 20px; height: 20px; border-radius: 0; 
            background: #000; border: 2px solid #fff; transition: all 0.4s; flex-shrink: 0;
        }
        .step-label {
            margin-left: 15px; font-size: 15px; color: #fff; font-weight: bold; text-transform: uppercase;
        }

        .step.completed .step-dot { background: #fff; border-color: #fff; } 
        .step.completed .step-label { color: #fff; }
        
        .step.active .step-dot { background: #fff; border-color: #fff; transform: scale(1.1); } 
        .step.active .step-label { color: #fff; text-shadow: none; }
        
        .step.locked .step-dot { background: #000; border-color: #888; } 
        .step.locked .step-label { color: #888; }

        .step.golden .step-dot {
            width: 28px; height: 28px; border-width: 3px; border-color: #fff; background: #000; margin-left: -4px; 
        }
        .step.golden .step-label { color: #fff; font-size: 16px; }
        
        .step.golden.active .step-dot, .step.golden.completed .step-dot {
            background: #fff; border-color: #fff; transform: scale(1.1); box-shadow: none;
        }
        .step.golden.active .step-label, .step.golden.completed .step-label {
            color: #fff; text-shadow: none;
        }

        /* --- CENTRIFUGE UI (MASHING MINIGAME) --- */
        #gforce-ui {
            position: absolute; top: 80px; left: 50%; transform: translateX(-50%);
            width: 500px; background: rgba(0, 0, 0, 0.95); border: 3px solid #ff4444; 
            padding: 20px; box-sizing: border-box; display: none; flex-direction: column; align-items: center; z-index: 2000;
        }
        #gforce-title { color: #ff4444; font-size: 24px; font-weight: bold; margin-bottom: 10px; animation: blink 0.5s infinite; letter-spacing: 2px; }
        #gforce-instructions { color: #fff; font-size: 16px; margin-bottom: 15px; text-align: center; }
        #gforce-bar-bg { width: 100%; height: 30px; background: #333; border: 2px solid #fff; position: relative; }
        #gforce-bar-fill { width: 100%; height: 100%; background: #ff4444; transition: width 0.1s linear; }

        /* --- DIALOGUE BOX --- */
        #dialogue-box {
            position: absolute; top: 30px; left: 50%; transform: translateX(-50%);
            width: 800px; height: 180px; background: rgba(0, 0, 0, 0.98); border: 2px solid #fff; 
            display: none; align-items: center; padding: 0 30px; box-sizing: border-box; z-index: 1000; 
        }

        #profile-img-container { 
            width: 120px; height: 120px; background: #111; border: 2px solid #fff; margin-right: 30px; flex-shrink: 0; display: flex; justify-content: center; align-items: center; overflow: hidden; 
        }
        #avatar-img { 
            width: 170%; image-rendering: pixelated; 
        }
        #text-container { color: #fff; font-size: 26px; flex-grow: 1; border-left: 2px solid #fff; padding-left: 25px; line-height: 1.3; position: relative;}

        #press-e-hint { position: absolute; bottom: -25px; right: 0; font-size: 14px; color: #fff; animation: blink 1s infinite; }
        @keyframes blink { 50% { opacity: 0; } }

        #game-container { width: 100%; height: 100%; }
        canvas { image-rendering: pixelated; }

        /* --- BLACK OVERLAY --- */
        #fade-overlay {
            position: absolute; top: 0; left: 0; width: 100vw; height: 100vh;
            background-color: #000; z-index: 9999; 
            display: flex; justify-content: center; align-items: center;
            opacity: 1; transition: opacity 1s ease; pointer-events: none;
        }
        
        #level-title-text {
            color: #fff; font-size: 40px; font-family: 'NbpInforma', sans-serif; text-align: center; line-height: 1.2;
            transition: opacity 0.5s ease;
        }
    </style>
</head>

<body>
    <audio id="bg-music" src="sound/lv5.mp3" loop></audio>

    <div id="fade-overlay">
        <div id="level-title-text">LEVEL 5<br>CENTRIFUGE</div>
    </div>

    <div id="ui-wrapper">
        <div id="nasa-ui">
            <div style="text-align: center; color:#fff; font-size:16px; text-transform: uppercase; font-weight: bold; letter-spacing: 2px; border-bottom: 2px solid #fff; padding-bottom: 10px;">
                ARTEMIS PROGRAM
            </div>
            <div class="step-wrapper">
                <div class="step-line"></div>
                <div id="step-line-fill" class="step-line-fill" style="height: 0%;"></div>
                <div id="stepper-container" class="stepper-container"></div>
            </div>
        </div>

        <div id="gforce-ui">
            <div id="gforce-title">WARNING: 9G REACHED</div>
            <div id="gforce-instructions">TAP [E] REPEATEDLY AND FAST TO STAY CONSCIOUS!</div>
            <div id="gforce-bar-bg">
                <div id="gforce-bar-fill"></div>
            </div>
        </div>

        <div id="dialogue-box">
            <div id="profile-img-container"><img id="avatar-img" src="Personaggi_oggetti/Scienziato_faccia1.png"></div>
            <div id="text-container">
                <strong id="npc-name-tag" style="color: #fff; text-transform: uppercase; font-size: 22px;">Dr. Aris</strong><br>
                <span id="dialogue-content" style="color: #fff;"></span>
                <div id="press-e-hint">Press [E] to continue</div>
            </div>
        </div>
        <div id="game-container"></div>
    </div>

    <script>
        // --- GESTIONE AUDIO NUOVA TRACCIA ---
        window.addEventListener('DOMContentLoaded', () => {
            const bgMusic = document.getElementById('bg-music');
            
            // Verifichiamo se stiamo passando a una traccia nuova
            if (sessionStorage.getItem('currentTrack') !== 'lv5') {
                sessionStorage.setItem('currentTrack', 'lv5');
                sessionStorage.setItem('musicTime', '0'); // Resetta il timer
            }

            // Imposta il tempo salvato
            bgMusic.currentTime = parseFloat(sessionStorage.getItem('musicTime') || 0);

            // Prova l'autoplay
            let playPromise = bgMusic.play();
            if (playPromise !== undefined) {
                playPromise.catch(error => {
                    console.log("Il browser ha bloccato l'audio. Riparto al primo tasto premuto!");
                    const forceAudioPlay = () => {
                        bgMusic.play();
                        sessionStorage.setItem('musicPlaying', 'true');
                        document.removeEventListener('click', forceAudioPlay);
                        document.removeEventListener('keydown', forceAudioPlay);
                    };
                    document.addEventListener('click', forceAudioPlay);
                    document.addEventListener('keydown', forceAudioPlay);
                });
            } else {
                sessionStorage.setItem('musicPlaying', 'true');
            }
            
            // Salva il tempo esatto prima di cambiare livello o aggiornare
            window.addEventListener('beforeunload', () => {
                sessionStorage.setItem('musicTime', bgMusic.currentTime);
            });
        });

        // --- GIOCO ---
        const playerName = localStorage.getItem('astronautName') || "Recruit";

        const missions = [
            { id: 0, title: "Drop Tower", status: "completed" }, 
            { id: 1, title: "Zero Gravity", status: "completed" },  
            { id: 2, title: "N.B.L. Lab", status: "completed" }, 
            { id: 3, title: "Vacuum Chamber", status: "completed" }, 
            { id: 4, title: "Centrifuge", status: "active" }, 
            { id: 5, title: "Moon Journey", status: "locked" } 
        ];

        let experimentState = 'READY'; 
        let isPlayerInCentrifuge = false;
        let resistance = 100;
        let spinTimer = 0;
        let spinPhase = 0; 
        const SURVIVAL_TIME = 10000; 
        
        let hasTalkedToScientist = false;
        let isDialogOpen = false;
        let isTransitioning = false; 
        
        let currentDialogueArray = [];
        let dialogueIndex = 0;
        let onDialogueComplete = null; 

        function updateUI() {
            const stepper = document.getElementById('stepper-container');
            const progressFill = document.getElementById('step-line-fill');
            if (!stepper || !progressFill) return;

            stepper.innerHTML = '';
            
            let activeIndex = missions.findIndex(m => m.status === 'active');
            if(activeIndex === -1) activeIndex = missions.length - 1; 
            
            let segments = missions.length - 1;
            let fillPercentage = (activeIndex / segments) * 100;
            progressFill.style.height = `${fillPercentage}%`;

            missions.forEach((m) => {
                const stepDiv = document.createElement('div');
                stepDiv.className = `step ${m.status}`;
                if (m.id === 5) stepDiv.classList.add('golden'); 

                const dot = document.createElement('div');
                dot.className = 'step-dot';
                
                const label = document.createElement('div');
                label.className = 'step-label';
                label.innerHTML = m.title;

                stepDiv.appendChild(dot);
                stepDiv.appendChild(label);
                stepper.appendChild(stepDiv);
            });
        }

        const WORLD_WIDTH = 2200; 
        const WORLD_HEIGHT = 600;
        const FLOOR_TOP = 540; 

        const SETTINGS = {
            playerScale: 5, npcScale: 6, npcX: 550, playerStartX: 100, 
            gravity: 2000, walkSpeed: 380, jumpForce: -850,
            minZoom: 1.2, maxZoom: 2.0, initialZoom: 1.5
        };

        const config = {
            type: Phaser.AUTO, parent: 'game-container',
            width: window.innerWidth, height: window.innerHeight,
            backgroundColor: '#050505', pixelArt: true,
            physics: { default: 'arcade', arcade: { gravity: { y: SETTINGS.gravity } } },
            scene: { preload: preload, create: create, update: update }
        };

        const game = new Phaser.Game(config);
        let player, npc, keys, interactKey, portalStart, portalEnd, jumpSound;
        let centrifuga; 

        function preload() {
            this.load.image('sfondo', 'Personaggi_oggetti/centrifuga_sfondo.png');
            this.load.image('astro1', 'Personaggi_oggetti/astronauta_neutro1.png');
            this.load.image('astro2', 'Personaggi_oggetti/astronauta_neutro2.png');
            this.load.image('walk1', 'Personaggi_oggetti/astronauta_camminata1.png');
            this.load.image('walk2', 'Personaggi_oggetti/astronauta_camminata2.png');
            this.load.image('scienziato1', 'Personaggi_oggetti/Scienziato_neutro1.png');
            this.load.image('scienziato2', 'Personaggi_oggetti/Scienziato_neutro2.png');
            this.load.image('porta', 'Personaggi_oggetti/porta.png');
            this.load.image('centrifuga', 'Personaggi_oggetti/centrifuga.png');
            this.load.audio('jump_sound', 'sound/jump.wav'); 
        }

        function create() {
            updateUI();
            
            this.physics.world.setBounds(0, 0, WORLD_WIDTH, WORLD_HEIGHT);
            jumpSound = this.sound.add('jump_sound');

            let bg = this.add.image(WORLD_WIDTH / 2, 0, 'sfondo');
            bg.setOrigin(0.5, 0); 
            bg.setDisplaySize(WORLD_WIDTH, FLOOR_TOP).setDepth(-1); 

            let platforms = this.physics.add.staticGroup();
            let floor = this.add.rectangle(WORLD_WIDTH / 2, FLOOR_TOP + 20, WORLD_WIDTH, 40, 0x333333);
            platforms.add(floor); 

            centrifuga = this.physics.add.sprite(1200, FLOOR_TOP, 'centrifuga');
            centrifuga.setOrigin(0.5, 1); 
            centrifuga.setScale(15); 
            centrifuga.body.setAllowGravity(false);
            centrifuga.body.setImmovable(true);

            portalStart = this.physics.add.sprite(100, FLOOR_TOP, 'porta').setOrigin(0.5, 1).setScale(5).setDepth(2);
            portalEnd = this.physics.add.sprite(2000, FLOOR_TOP, 'porta').setOrigin(0.5, 1).setScale(5).setDepth(2);
            portalStart.body.setAllowGravity(false); portalEnd.body.setAllowGravity(false);
            
            portalStart.setTint(0x555555);
            portalEnd.setTint(0x555555); 

            npc = this.physics.add.sprite(SETTINGS.npcX, FLOOR_TOP, 'scienziato1').setScale(SETTINGS.npcScale).setOrigin(0.5, 1).setDepth(3);
            player = this.physics.add.sprite(SETTINGS.playerStartX, FLOOR_TOP, 'astro1').setScale(SETTINGS.playerScale).setOrigin(0.5, 1).setDepth(4);

            this.physics.add.collider(player, platforms);
            this.physics.add.collider(npc, platforms);
            
            player.setCollideWorldBounds(true);
            npc.setImmovable(true); npc.body.setAllowGravity(false);

            this.anims.create({ key: 'astro_idle', frames: [{ key: 'astro1' }, { key: 'astro2' }], frameRate: 4, repeat: -1 });
            this.anims.create({ key: 'astro_walk', frames: [{ key: 'walk1' }, { key: 'walk2' }], frameRate: 10, repeat: -1 });
            this.anims.create({ key: 'scien_idle', frames: [{ key: 'scienziato1' }, { key: 'scienziato2' }], frameRate: 3, repeat: -1 });
            npc.play('scien_idle');

            this.cameras.main.setBounds(0, 0, WORLD_WIDTH, WORLD_HEIGHT);
            this.cameras.main.startFollow(player, true, 0.1, 0.1).setZoom(1.5);

            keys = this.input.keyboard.addKeys('W,A,D,SPACE');
            interactKey = this.input.keyboard.addKey('E');
            
            this.interactPrompt = this.add.text(0, 0, "", { 
                fontSize: '20px', fill: '#ffffff', fontFamily: 'NbpInforma', align: 'center'
            }).setOrigin(0.5).setVisible(false).setDepth(10);

            setTimeout(() => {
                document.getElementById('fade-overlay').style.opacity = '0';
            }, 1000);
        }

        function triggerMainDialogue() {
            startDialogue([
                `We are at the final physical hurdle, ${playerName.toUpperCase()}! The dreaded Centrifuge!`,
                `This machine will spin you at extreme speeds to simulate the G-force of a rocket launch.`,
                `You will endure up to 9G of force on your body. Blood will tend to flow away from your brain towards your legs.`,
                `If you don't react, you'll pass out (G-LOC). The only way to resist is to contract your body muscles!`,
                `Approach the centrifuge and press [E] to board.`,
                `Once it starts, you must press [E] REPEATEDLY and FAST to stay conscious. Hold on for 10 seconds!`
            ], () => { hasTalkedToScientist = true; });
        }

        function startCentrifuge() {
            experimentState = 'SPINNING';
            isPlayerInCentrifuge = true;
            resistance = 100;
            spinTimer = 0;
            spinPhase = 0; 
            
            player.setVisible(false);
            player.body.setAllowGravity(false);
            
            document.getElementById('gforce-ui').style.display = 'flex';
        }

        function endCentrifuge(win) {
            experimentState = win ? 'COMPLETED' : 'READY';
            isPlayerInCentrifuge = false;
            
            document.getElementById('gforce-ui').style.display = 'none';
            centrifuga.scaleX = 15; 
            this.cameras.main.shake(0);

            player.setPosition(centrifuga.x - 150, FLOOR_TOP);
            player.setVisible(true);
            player.body.setAllowGravity(true);

            if (win) {
                missions[4].status = "completed";
                updateUI();
                startDialogue([
                    `Outstanding, ${playerName}! You endured 9G without blacking out!`,
                    `Your physical training is officially complete. You are in perfect shape.`,
                    `Now proceed to the exit on the right. Your final simulation awaits: The Journey to the Moon.`
                ]);
            } else {
                this.cameras.main.flash(500, 0, 0, 0); 
                startDialogue([
                    `You passed out, ${playerName}! You didn't contract your muscles fast enough.`,
                    `Take a breath, have some water, and try again. You need to press [E] much faster!`
                ]);
            }
        }

        function startDialogue(phrases, callback = null) {
            currentDialogueArray = phrases; dialogueIndex = 0;
            isDialogOpen = true; onDialogueComplete = callback; 
            if (player) { player.setVelocityX(0); player.play('astro_idle', true); }
            document.getElementById('dialogue-content').innerText = currentDialogueArray[dialogueIndex];
            document.getElementById('dialogue-box').style.display = 'flex';
            setTimeout(() => document.getElementById('dialogue-box').style.opacity = '1', 10);
        }

        function update(time, delta) {
            npc.setFlipX(player.x < npc.x);

            if (isTransitioning) return;

            if (isDialogOpen) {
                player.setVelocityX(0); 
                player.play('astro_idle', true);

                if (Phaser.Input.Keyboard.JustDown(interactKey)) {
                    dialogueIndex++;
                    if (dialogueIndex < currentDialogueArray.length) {
                        document.getElementById('dialogue-content').innerText = currentDialogueArray[dialogueIndex];
                    } else {
                        isDialogOpen = false;
                        document.getElementById('dialogue-box').style.opacity = '0';
                        setTimeout(() => document.getElementById('dialogue-box').style.display = 'none', 200);
                        if (onDialogueComplete) { onDialogueComplete(); onDialogueComplete = null; }
                    }
                }
                return; 
            }

            if (!hasTalkedToScientist && !isPlayerInCentrifuge && player.x > npc.x - 60) {
                player.setX(npc.x - 70); 
                player.setVelocityX(0);
                player.play('astro_idle', true);
                triggerMainDialogue();
            }

            if (isPlayerInCentrifuge) {
                spinTimer += delta;
                let progress = spinTimer / SURVIVAL_TIME;
                if (progress > 1) progress = 1;

                let intensity = Math.sin(progress * Math.PI); 
                let currentSpeed = 0.002 + (0.035 * intensity); 
                spinPhase += currentSpeed * delta; 
                centrifuga.scaleX = 15 * Math.cos(spinPhase); 
                
                this.cameras.main.shake(100, 0.001 + (0.009 * intensity)); 

                let currentDrain = 20 + (75 * intensity); 
                resistance -= currentDrain * (delta / 1000); 

                if (Phaser.Input.Keyboard.JustDown(interactKey)) {
                    resistance += 15; 
                }

                if (resistance > 100) resistance = 100;
                document.getElementById('gforce-bar-fill').style.width = `${resistance}%`;

                if (resistance <= 0) {
                    endCentrifuge.call(this, false); 
                } else if (spinTimer >= SURVIVAL_TIME) {
                    endCentrifuge.call(this, true);  
                }
                return; 
            }

            player.body.setDragX(0);
            if (keys.A.isDown) { player.setVelocityX(-380); player.setFlipX(true); player.play('astro_walk', true); } 
            else if (keys.D.isDown) { player.setVelocityX(380); player.setFlipX(false); player.play('astro_walk', true); } 
            else { player.setVelocityX(0); player.play('astro_idle', true); }

            if ((Phaser.Input.Keyboard.JustDown(keys.W) || Phaser.Input.Keyboard.JustDown(keys.SPACE)) && player.body.touching.down) {
                player.setVelocityY(-850); jumpSound.play(); 
            }

            this.interactPrompt.setVisible(false);
            
            let distNpc = Phaser.Math.Distance.Between(player.x, player.y, npc.x, npc.y);
            let distCentrifuga = Phaser.Math.Distance.Between(player.x, player.y, centrifuga.x, centrifuga.y);
            let distDoor = Phaser.Math.Distance.Between(player.x, player.y, portalEnd.x, portalEnd.y);

            if (distNpc < 200) {
                this.interactPrompt.setPosition(npc.x, npc.y - 220).setText("[E] TALK").setVisible(true);
                if (Phaser.Input.Keyboard.JustDown(interactKey) && !isDialogOpen) {
                    if (!hasTalkedToScientist && experimentState !== 'COMPLETED') { triggerMainDialogue(); } 
                    else if (experimentState === 'READY') { startDialogue([`Go to the centrifuge and press [E] to board. Get ready to mash [E] to stay awake!`]); } 
                    else if (experimentState === 'COMPLETED') { startDialogue([`You've passed all physical tests. Now go to the final Moon simulation!`]); }
                }
            } 
            else if (distCentrifuga < 350 && hasTalkedToScientist && experimentState === 'READY') {
                this.interactPrompt.setPosition(centrifuga.x, centrifuga.y - 400).setText("[E] ENTER").setVisible(true);
                if (Phaser.Input.Keyboard.JustDown(interactKey)) {
                    startCentrifuge.call(this);
                }
            }
            else if (distDoor < 150) {
                if (experimentState !== 'COMPLETED') {
                    this.interactPrompt.setPosition(portalEnd.x, portalEnd.y - 250).setText("LOCKED").setVisible(true);
                } else {
                    if (distDoor < 50 && !isTransitioning) {
                        isTransitioning = true;
                        player.setVelocity(0, 0);
                        player.play('astro_idle', true);
                        
                        document.getElementById('level-title-text').style.opacity = '0'; 
                        const overlay = document.getElementById('fade-overlay');
                        overlay.style.opacity = '1'; 
                        
                        setTimeout(() => { 
                            window.location.href = 'livello6.html'; 
                        }, 1000);
                    } else if (!isTransitioning) {
                        this.interactPrompt.setPosition(portalEnd.x, portalEnd.y - 250).setText("ENTER").setVisible(true);
                    }
                }
            }
        }
    </script>
</body>
</html>
